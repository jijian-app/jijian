<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>即简</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#000;color:#fff;min-height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none}
.app{height:100vh;display:flex;flex-direction:column}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #222}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border:2px solid #fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:-1px;line-height:1}
.logo-text{font-size:18px;font-weight:700;letter-spacing:2px}
.mood-face{font-size:22px}

/* Swipe dots */
.dots{display:flex;justify-content:center;gap:8px;padding:12px 0}
.dot{width:6px;height:6px;border-radius:50%;background:#333;transition:.3s}
.dot.on{background:#fff;width:20px;border-radius:3px}

/* Swipe container */
.pages-wrapper{flex:1;overflow:hidden;position:relative}
.pages{display:flex;height:100%;transition:transform .35s cubic-bezier(.25,.8,.25,1);will-change:transform;touch-action:pan-y}
.page{min-width:100%;height:100%;overflow-y:auto;padding:20px 20px 30px;-webkit-overflow-scrolling:touch}

/* Shared */
.btn{display:block;width:100%;max-width:280px;margin:20px auto;padding:14px 0;border:2px solid #fff;background:#fff;color:#000;font-size:16px;font-weight:600;border-radius:12px;cursor:pointer;text-align:center;transition:opacity .2s}
.btn:active{opacity:.7}
.btn-outline{background:transparent;color:#fff}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:24px}
.subtitle{color:#888;font-size:14px;margin-top:6px;text-align:center}

/* ===== Chat ===== */
.chat-box{flex:1;overflow-y:auto;padding-right:4px;display:flex;flex-direction:column;gap:14px;margin-bottom:16px;min-height:300px}
.msg{display:flex;gap:8px;max-width:85%}
.msg.ai{align-self:flex-start}
.msg.mine{align-self:flex-end;flex-direction:row-reverse}
.msg .face{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:#1a1a1a;flex-shrink:0}
.msg .text{padding:12px 14px;border-radius:16px;font-size:15px;line-height:1.6}
.msg.ai .text{background:#111;border:1px solid #222;border-bottom-left-radius:4px}
.msg.mine .text{background:#fff;color:#000;border-bottom-right-radius:4px}
.chat-bar{display:flex;gap:8px;padding-top:8px;border-top:1px solid #222}
.chat-bar input{flex:1;padding:14px 16px;border-radius:24px;border:1px solid #333;background:#111;color:#fff;font-size:15px;outline:none}
.chat-bar input:focus{border-color:#fff}
.chat-bar button{padding:14px 20px;border-radius:24px;border:none;background:#fff;color:#000;font-size:15px;font-weight:600;cursor:pointer}
.chat-bar button:active{opacity:.7}

/* ===== Tarot ===== */
.tarot-deck{display:flex;justify-content:center;gap:12px;margin:24px 0}
.tarot-card{width:70px;height:100px;border:2px solid #333;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:32px;background:#111}
.tarot-result{text-align:center;display:none}
.tarot-result .big{font-size:80px;margin:16px 0}
.tarot-result .name{font-size:22px;font-weight:700;margin-bottom:12px}
.tarot-result .desc{color:#aaa;font-size:15px;line-height:1.7;max-width:280px;margin:0 auto}

/* ===== Guoxue ===== */
.guoxue-card{text-align:center}
.guoxue-quote{font-size:22px;line-height:1.7;font-weight:600;margin:20px 0}
.guoxue-source{color:#888;font-size:14px}
.guoxue-insight{margin-top:16px;padding-top:16px;border-top:1px solid #222;font-size:15px;color:#ccc;line-height:1.8}

/* ===== Test ===== */
.test-progress{color:#888;font-size:13px;margin-bottom:16px}
.test-question{font-size:18px;line-height:1.6;font-weight:600;margin-bottom:20px}
.test-options{display:flex;flex-direction:column;gap:10px}
.test-options>div{padding:16px 18px;border-radius:12px;background:#111;border:1px solid #333;font-size:15px;cursor:pointer;transition:all .15s}
.test-options>div:active{background:#fff;color:#000;border-color:#fff}
.test-result{text-align:center;display:none}
.test-score{font-size:64px;font-weight:700;margin:10px 0}
.test-text{color:#ccc;font-size:16px;line-height:1.7}

/* ===== Mood ===== */
.mood-faces{display:flex;justify-content:center;gap:16px;margin:20px 0}
.mface{font-size:40px;cursor:pointer;opacity:.3;transition:.2s;padding:8px}
.mface.sel,.mface:active{opacity:1;transform:scale(1.25)}
textarea{width:100%;padding:14px;border-radius:12px;background:#111;border:1px solid #333;color:#fff;font-size:15px;resize:none;outline:none;font-family:inherit;min-height:80px}
textarea:focus{border-color:#fff}
.mood-history{margin-top:24px}
.mood-history h3{font-size:14px;color:#888;margin-bottom:12px}
.mood-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:#111}
.mood-item .e{font-size:20px}
.mood-item .i{flex:1;font-size:14px}
.mood-item .t{color:#666;font-size:12px}

/* Chat pages full-height */
.p-chat{display:flex;flex-direction:column;min-height:100%}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">即<br>简</div>
      <div class="logo-text">即简</div>
    </div>
    <div class="mood-face" id="topFace">😊</div>
  </div>

  <!-- Dots -->
  <div class="dots" id="dots">
    <div class="dot on" data-i="0"></div>
    <div class="dot" data-i="1"></div>
    <div class="dot" data-i="2"></div>
    <div class="dot" data-i="3"></div>
    <div class="dot" data-i="4"></div>
  </div>

  <!-- Pages Wrapper -->
  <div class="pages-wrapper" id="wrapper">
    <div class="pages" id="pages">

      <!-- 1. Chat -->
      <div class="page p-chat">
        <div class="chat-box" id="cb">
          <div class="msg ai"><div class="face">🌱</div><div class="text">你好呀，我是即简 👋<br>你的即时正向反馈伙伴 ✨</div></div>
        </div>
        <div class="chat-bar">
          <input type="text" id="ci" placeholder="说说你现在的心情...">
          <button id="cs">发送</button>
        </div>
      </div>

      <!-- 2. Tarot -->
      <div class="page">
        <div class="card" style="text-align:center">
          <h2>今日塔罗</h2>
          <div class="subtitle">抽一张牌，获取今日指引</div>
          <div class="tarot-deck"><div class="tarot-card">🃏</div><div class="tarot-card">🃏</div><div class="tarot-card">🃏</div></div>
          <div class="tarot-result" id="tr"><div class="big" id="tbig"></div><div class="name" id="tname"></div><div class="desc" id="tdesc"></div><button class="btn btn-outline" onclick="doTarot()">再抽一张</button></div>
          <button class="btn" id="tbtn" onclick="doTarot()">抽牌</button>
        </div>
      </div>

      <!-- 3. Guoxue -->
      <div class="page">
        <div class="card guoxue-card">
          <h2>今日国学</h2>
          <div class="subtitle">一句古语，点亮当下</div>
          <div class="guoxue-quote" id="gt">点击下方按钮<br>获取今日国学智慧</div>
          <div class="guoxue-source" id="gs"></div>
          <div class="guoxue-insight" id="gi"></div>
          <button class="btn btn-outline" onclick="doGuoxue()">获取智慧</button>
        </div>
      </div>

      <!-- 4. Test -->
      <div class="page">
        <div class="card" id="tc">
          <h2>心理健康自查</h2>
          <div class="subtitle">快速了解情绪状态</div>
          <div class="test-progress" id="tprog"></div>
          <div class="test-question" id="tq"></div>
          <div class="test-options" id="to"></div>
        </div>
        <div class="card test-result" id="tr2">
          <h2>评估结果</h2>
          <div class="test-score" id="tscore"></div>
          <div class="test-text" id="ttext"></div>
          <button class="btn btn-outline" onclick="doTest()">重新测试</button>
        </div>
      </div>

      <!-- 5. Mood -->
      <div class="page">
        <div class="card" style="text-align:center">
          <h2>心情记录</h2>
          <div class="subtitle">记录此刻，关照自己</div>
          <div class="mood-faces">
            <span class="mface" data-m="great" onclick="pickMood(this)">😄</span>
            <span class="mface" data-m="good" onclick="pickMood(this)">🙂</span>
            <span class="mface" data-m="neutral" onclick="pickMood(this)">😐</span>
            <span class="mface" data-m="bad" onclick="pickMood(this)">😔</span>
            <span class="mface" data-m="terrible" onclick="pickMood(this)">😢</span>
          </div>
          <textarea id="mn" placeholder="说说今天发生了什么..."></textarea>
          <button class="btn" onclick="doMood()">记录心情</button>
          <div class="mood-history">
            <h3>历史记录</h3>
            <div id="ml"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ===== SWIPE =====
var currentPage = 0;
var totalPages = 5;
var wrapper = document.getElementById('wrapper');
var pages = document.getElementById('pages');
var dots = document.querySelectorAll('.dot');
var startX = 0, startY = 0, isSwiping = false, hasMoved = false;

function goPage(n) {
  if (n < 0 || n >= totalPages) return;
  currentPage = n;
  pages.style.transform = 'translateX(-' + (n * 100) + '%)';
  dots.forEach(function(d, i) { d.classList.toggle('on', i === n); });
}

wrapper.addEventListener('touchstart', function(e) {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  isSwiping = true;
  hasMoved = false;
  pages.style.transition = 'none';
}, {passive: true});

wrapper.addEventListener('touchmove', function(e) {
  if (!isSwiping) return;
  var dx = e.touches[0].clientX - startX;
  var dy = e.touches[0].clientY - startY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 5) {
    hasMoved = true;
    e.preventDefault();
    var offset = -currentPage * 100 + (dx / wrapper.offsetWidth) * 100;
    offset = Math.max(-(totalPages - 1) * 100, Math.min(0, offset));
    pages.style.transform = 'translateX(' + offset + '%)';
  }
}, {passive: false});

wrapper.addEventListener('touchend', function(e) {
  if (!isSwiping) return;
  isSwiping = false;
  pages.style.transition = 'transform .35s cubic-bezier(.25,.8,.25,1)';
  var dx = e.changedTouches[0].clientX - startX;
  if (hasMoved && Math.abs(dx) > 60) {
    if (dx < 0) goPage(currentPage + 1);
    else goPage(currentPage - 1);
  } else {
    goPage(currentPage);
  }
});

// Dot click
document.getElementById('dots').addEventListener('click', function(e) {
  var i = parseInt(e.target.dataset.i);
  if (!isNaN(i)) goPage(i);
});

// ===== CHAT =====
var chatBox = document.getElementById('cb');
var ci = document.getElementById('ci');
var cs = document.getElementById('cs');

cs.addEventListener('click', sendChat);
ci.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendChat(); });

function sendChat() {
  var t = ci.value.trim();
  if (!t) return;
  addMsg(t, 'mine');
  ci.value = '';
  setTimeout(function() { addMsg(reply(t), 'ai'); }, 500 + Math.random() * 600);
}

function addMsg(t, who) {
  var d = document.createElement('div');
  d.className = 'msg ' + who;
  d.innerHTML = '<div class="face">' + (who === 'ai' ? '🌱' : '😊') + '</div><div class="text">' + t + '</div>';
  chatBox.appendChild(d);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function reply(t) {
  t = t.toLowerCase();
  var kw_pos = ['开心','高兴','快乐','好','棒','厉害','不错','幸福','正能量','加油','感恩','幸运'];
  var kw_neg = ['难过','伤心','焦虑','压力','烦','累','无聊','孤独','郁闷','压抑','迷茫','害怕','担心','崩溃','痛苦','失眠','绝望'];
  var pr = ['太好了 🎉 能感受到你的积极能量~','你的好心情很有感染力 ✨','听到你开心我也开心 😊','棒棒的 🌟','继续保持这份能量！'];
  var nr = ['我感受到了 🫂 有这样的感受很正常，不需要苛责自己。','谢谢你告诉我 💜 低谷只是暂时的，你比自己想的更坚强。','说出来本身就是一种勇气 🌱 我一直在。','嗯，我听到了 🤗 被看见就是最好的安慰。','给自己一点时间，一切都会慢慢好起来的。'];
  var dr = ['我在听 💚 继续说吧~','谢谢你和我分享 🌸','嗯嗯，我理解 ✨','我在呢 🌷 一直都在。','多说说你现在的感受吧~'];
  if (kw_pos.some(function(w) { return t.indexOf(w) > -1; })) return pr[Math.floor(Math.random() * pr.length)];
  if (kw_neg.some(function(w) { return t.indexOf(w) > -1; })) return nr[Math.floor(Math.random() * nr.length)];
  return dr[Math.floor(Math.random() * dr.length)];
}

// ===== TAROT =====
var tcards = [
  {n:'愚者',e:'🃏',d:'新的开始，无限可能。勇敢迈出第一步吧！'},
  {n:'魔术师',e:'🎩',d:'你拥有实现想法的一切资源，相信自己的能力！'},
  {n:'女祭司',e:'🌙',d:'安静下来，聆听内心，答案就在你心中。'},
  {n:'皇后',e:'👑',d:'你值得被爱、被照顾。享受生活的丰盛！'},
  {n:'星星',e:'⭐',d:'希望正在闪耀，星光为你指引方向。'},
  {n:'太阳',e:'☀️',d:'一切都在变好，你的努力正在开花结果！'},
  {n:'世界',e:'🌍',d:'圆满与完成。为你走过的路感到骄傲吧！'},
  {n:'力量',e:'🦁',d:'内在力量比你想象的更强大。温柔而坚定。'},
  {n:'命运之轮',e:'🎡',d:'转机即将来临。拥抱改变，好运正在转向你！'},
  {n:'节制',e:'⚖️',d:'找到自己的节奏。不急不躁，恰到好处。'},
  {n:'月亮',e:'🌕',d:'迷雾终将散去。给自己一点时间，一切都会清晰。'},
  {n:'正义',e:'⚔️',d:'做对的事。宇宙会回报你的真诚与善良。'}
];

function doTarot() {
  var c = tcards[Math.floor(Math.random() * tcards.length)];
  document.getElementById('tbtn').style.display = 'none';
  var r = document.getElementById('tr');
  r.style.display = 'block';
  document.getElementById('tbig').textContent = c.e;
  document.getElementById('tname').textContent = c.n;
  document.getElementById('tdesc').textContent = c.d;
}

// ===== GUOXUE =====
var gdata = [
  {t:'天行健，君子以自强不息。',s:'《周易》',i:'宇宙不停运转，你也一样。每步坚持都在积蓄力量。'},
  {t:'知者不惑，仁者不忧，勇者不惧。',s:'《论语》',i:'你需要的就是这份不惑、不忧、不惧的勇气。'},
  {t:'山重水复疑无路，柳暗花明又一村。',s:'陆游',i:'眼前的困难只是暂时的，转角处就有新希望。'},
  {t:'长风破浪会有时，直挂云帆济沧海。',s:'李白',i:'属于你的风终会来。耐心等待。'},
  {t:'莫听穿林打叶声，何妨吟啸且徐行。',s:'苏轼',i:'风雨中的从容，才是真正的力量。慢慢走。'},
  {t:'人一能之，己百之；人十能之，己千之。',s:'《中庸》',i:'不用和别人比，按自己的节奏，每一步都算数。'},
  {t:'不经一番寒彻骨，怎得梅花扑鼻香。',s:'黄檗禅师',i:'你所经历的磨砺，都将化作独特的芬芳。'}
];

function doGuoxue() {
  var g = gdata[Math.floor(Math.random() * gdata.length)];
  document.getElementById('gt').innerHTML = '「' + g.t + '」';
  document.getElementById('gs').innerHTML = '—— ' + g.s;
  document.getElementById('gi').innerHTML = '💡 ' + g.i;
}

// ===== TEST =====
var tq = [
  {q:'最近一周，你多久会感到心情低落？',o:['几乎没有','偶尔','有时','经常','几乎每天']},
  {q:'你对日常活动的兴趣如何？',o:['非常感兴趣','比较感兴趣','一般','兴趣减少','完全没兴趣']},
  {q:'你的睡眠质量评价如何？',o:['很好','较好','一般','较差','很差']},
  {q:'遇到困难时，有人可以倾诉吗？',o:['有很多人','有一些人','只有一两个','几乎没有','完全没有']},
  {q:'你觉得自己是有价值的吗？',o:['非常有价值','比较有价值','一般','不太觉得','完全没感觉']}
];
var ts = 0, ta = [];

function doTest() {
  ts = 0; ta = [];
  document.getElementById('tr2').style.display = 'none';
  document.getElementById('tc').style.display = 'block';
  nextQ();
}

function nextQ() {
  if (ts >= tq.length) { finish(); return; }
  var q = tq[ts];
  document.getElementById('tprog').textContent = (ts + 1) + '/' + tq.length;
  document.getElementById('tq').textContent = q.q;
  var o = document.getElementById('to');
  o.innerHTML = '';
  q.o.forEach(function(opt, i) {
    var b = document.createElement('div');
    b.textContent = opt;
    b.onclick = function() { ta.push(i); ts++; nextQ(); };
    o.appendChild(b);
  });
}

function finish() {
  document.getElementById('tc').style.display = 'none';
  document.getElementById('tr2').style.display = 'block';
  var s = ta.reduce(function(a, b) { return a + b; }, 0);
  var p = Math.round((1 - s / (tq.length * 4)) * 100);
  var e, t;
  if (p >= 80) { e = '🌟'; t = '心理状态非常好！继续保持~'; }
  else if (p >= 60) { e = '🙂'; t = '整体状态不错！保持运动、社交和作息~'; }
  else if (p >= 40) { e = '🤔'; t = '你可能在经历一些压力。试试散步、找朋友聊聊。'; }
  else if (p >= 20) { e = '💜'; t = '你承受了不少。请善待自己，必要时寻求专业帮助。'; }
  else { e = '🫂'; t = '你不孤单。可拨打心理援助热线 400-161-9995。'; }
  document.getElementById('tscore').textContent = e + ' ' + p + '分';
  document.getElementById('ttext').textContent = t;
}

doTest();

// ===== MOOD =====
var sm = null;

function pickMood(el) {
  document.querySelectorAll('.mface').forEach(function(x) { x.classList.remove('sel'); });
  el.classList.add('sel');
  sm = el.dataset.m;
}

function doMood() {
  if (!sm) { alert('请先选一个心情表情~'); return; }
  var note = document.getElementById('mn').value.trim();
  var dd = {great:'😄',good:'🙂',neutral:'😐',bad:'😔',terrible:'😢'};
  var now = new Date();
  var timeStr = (now.getMonth()+1)+'/'+now.getDate()+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var item = {m:sm, e:dd[sm], n:note, t:timeStr};
  var h = JSON.parse(localStorage.getItem('jj') || '[]');
  h.unshift(item);
  if (h.length > 30) h = h.slice(0, 30);
  localStorage.setItem('jj', JSON.stringify(h));
  document.getElementById('mn').value = '';
  document.querySelectorAll('.mface').forEach(function(x) { x.classList.remove('sel'); });
  sm = null;
  document.getElementById('topFace').textContent = dd[item.m];
  showMoods();
}

function showMoods() {
  var h = JSON.parse(localStorage.getItem('jj') || '[]');
  var l = document.getElementById('ml');
  if (!h.length) { l.innerHTML = '<div style="color:#666;text-align:center;padding:20px">还没有记录哦~</div>'; return; }
  l.innerHTML = h.map(function(x) {
    return '<div class="mood-item"><span class="e">' + x.e + '</span><div class="i"><div class="t">' + x.t + '</div>' + (x.n || '') + '</div></div>';
  }).join('');
}

showMoods();
</script>
</body>
</html>
